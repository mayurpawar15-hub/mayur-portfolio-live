document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    // Per-page prep: substitute UUIDs, strip SRI/crossorigin (blob URLs from a
    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.
    function resourcesFor(id) {
      var map = {};
      var list = extResources[id] || [];
      for (var k = 0; k < list.length; k++) {
        if (blobUrls[list[k].uuid]) map[list[k].id] = blobUrls[list[k].uuid];
      }
      return map;
    }
    for (const id of pageIds) {
      let t = pages[id];
      for (const uuid of uuids) t = t.split(uuid).join(blobUrls[uuid]);
      t = t.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');
      // The click interceptor owns every anchor click (not a <base target>):
      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.
      // composedPath + getAttribute('target') handle SVG <a> and shadow-DOM
      // anchors, which closest()/IDL .target get wrong.
      var headContent = 'window.__resources = ' + JSON.stringify(resourcesFor(id)) + ';' +
        (pageIds.length > 1 ?
          'window.__bundler_pages = ' + JSON.stringify(pageIds) + ';' +
          'document.addEventListener("click", function(e){' +
            'if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.defaultPrevented) return;' +
            'var a = null, p = e.composedPath ? e.composedPath() : [e.target];' +
            'for (var j = 0; j < p.length && !a; j++) {' +
              'var n = p[j], tn = n && n.tagName;' +
              'if (tn === "A" || tn === "a" || tn === "AREA") a = n;' +
            '}' +
            'if (!a && e.target.closest) a = e.target.closest("a, area");' +
            'if (!a || a.hasAttribute("download")) return;' +
            'var tg = a.getAttribute("target");' +
            'if (tg && tg !== "_self") return;' +
            'var h = a.getAttribute("href") || a.getAttribute("xlink:href");' +
            'if (!h || /^javascript:/i.test(h)) return;' +
            'if (h.charAt(0) !== "#") {' +
              'if (!tg) { var b = document.querySelector("base[target]"); if (b && b.getAttribute("target") !== "_self") return; }' +
              'e.preventDefault();' +
              'if (/^(?:[a-z][a-z0-9+.-]*:|\\/\\/)/i.test(h)) parent.location.assign(h);' +
              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');
      // Defuse any script end-tag sequence in the content (resource ids, page
      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.
      var headOpen = t.match(/<head[^>]*>/i);
      if (headOpen) {
        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).
      var template = pages[entryId];
      const doc = new DOMParser().parseFromString(template, 'text/html');
      document.documentElement.replaceWith(doc.documentElement);
      const dead = Array.from(document.scripts);
      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.
        if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          } catch (e) {}
        }
        // Non-executable script types (text/babel, application/json, …) are
        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);
        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

;font-weight:600;color:var(--ink);background:var(--bg2);border:1px solid var(--border);padding:8px 14px;border-radius:9px;\">HCLTech · Managing Consultant\u003c/span>\n          \u003cspan style=\"font-size:13.5px;font-weight:600;color:var(--ink);background:var(--bg2);border:1px solid var(--border);padding:8px 14px;border-radius:9px;\">Ex-Deloitte · 9 yrs\u003c/span>\n          \u003cspan style=\"font-size:13.5px;font-weight:600;color:var(--ink);background:var(--bg2);border:1px solid var(--border);padding:8px 14px;border-radius:9px;\">PGD-ERP · COEP\u003c/span>\n          \u003cspan style=\"font-size:13.5px;font-weight:600;color:var(--ink);background:var(--bg2);border:1px solid var(--border);padding:8px 14px;border-radius:9px;\">SAP ABAP Certified\u003c/span>\n        \u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/section>\n\n  \u003c!-- EXPERIENCE -->\n  \u003csection id=\"experience\" style=\"background:var(--bg2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);\">\n    \u003cdiv style=\"max-width:1180px;margin:0 auto;padding:88px 28px;\">\n      \u003cdiv data-reveal=\"\" style=\"font-size:13px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;color:var(--accent);margin-bottom:14px;\">Experience\u003c/div>\n      \u003ch2 data-reveal=\"\" class=\"pf-h2\" style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:35px;letter-spacing:-1px;margin:0 0 44px;color:var(--ink);\">A track record of programs that shipped.\u003c/h2>\n\n      \u003cdiv style=\"display:flex;flex-direction:column;gap:18px;\">\n\n        \u003cdiv data-reveal=\"\" style=\"background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:30px 32px;box-shadow:0 10px 30px -22px rgba(10,31,68,0.3);transition:transform .25s,box-shadow .25s;\" style-hover=\"transform:translateY(-4px);box-shadow:0 20px 44px -24px rgba(10,31,68,0.4);\">\n          \u003cdiv style=\"display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;align-items:baseline;margin-bottom:6px;\">\n            \u003cdiv style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:21px;color:var(--ink);\">Managing Consultant \u003cspan style=\"color:var(--ink3);font-weight:500;\">· HCLTech\u003c/span>\u003c/div>\n            \u003cdiv style=\"font-size:13.5px;font-weight:600;color:var(--accent);\">Jan 2025 — Present · Chicago, USA\u003c/div>\n          \u003c/div>\n          \u003cp style=\"font-size:15.5px;color:var(--ink2);margin:0 0 16px;\">Leading the SAP Finance workstream for a large demerger &amp; carve-out — separating financial structures, reporting entities, and master data across new operating models.\u003c/p>\n          \u003cul style=\"margin:0;padding-left:18px;color:var(--ink2);font-size:15px;display:flex;flex-direction:column;gap:8px;\">\n            \u003cli>Own the carve-out roadmap across company codes, controlling areas, profit/cost centers, and segments — protecting reconciliation, auditability, and reporting continuity.\u003c/li>\n            \u003cli>Lead the finance track through cutover planning and execution with minimal business disruption.\u003c/li>\n            \u003cli>Partner with legal, tax, and corporate finance to translate target operating models into SAP design.\u003c/li>\n          \u003c/ul>\n        \u003c/div>\n\n        \u003cdiv data-reveal=\"\" style=\"background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:30px 32px;box-shadow:0 10px 30px -22px rgba(10,31,68,0.3);transition:transform .25s,box-shadow .25s;\" style-hover=\"transform:translateY(-4px);box-shadow:0 20px 44px -24px rgba(10,31,68,0.4);\">\n          \u003cdiv style=\"display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;align-items:baseline;margin-bottom:6px;\">\n            \u003cdiv style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:21px;color:var(--ink);\">SAP Senior Consultant \u003cspan style=\"color:var(--ink3);font-weight:500;\">· \"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:900},&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#0a6ed1&quot;,&quot;options&quot;:[&quot;#0a6ed1&quot;,&quot;#1f6feb&quot;,&quot;#6d5ef0&quot;,&quot;#0f9d8b&quot;,&quot;#e0653a&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;showMarquee&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;glow&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  state = { p: 0, theme: \"system\" };\n\n  componentDidMount() {\n    try { const t = localStorage.getItem(\"pf-theme\"); if (t) this.state.theme = t; } catch (e) {}\n    this.mq = window.matchMedia(\"(prefers-color-scheme: dark)\");\n    this._mqHandler = () => { if (this.state.theme === \"system\") { this.applyTheme(); this.updateSeg(); } };\n    if (this.mq && this.mq.addEventListener) this.mq.addEventListener(\"change\", this._mqHandler);\n\n    // count-up\n    const dur = 1600;\n    const start = performance.now();\n    const tick = (now) => {\n      const t = Math.min(1, (now - start) / dur);\n      const e = 1 - Math.pow(1 - t, 3);\n      this.setState({ p: e });\n      if (t \u003c 1) requestAnimationFrame(tick);\n    };\n    requestAnimationFrame(tick);\n\n    this.applyTheme();\n    this.updateSeg();\n    this.setupReveal();\n    this.injectSEO();\n  }\n\n  injectSEO() {\n    if (this._seo) return;\n    this._seo = true;\n    try {\n      document.title = \"Mayur Shankar Pawar — SAP S/4HANA Finance Manager | SAP FICO & Central Finance\";\n      document.documentElement.setAttribute(\"lang\", \"en\");\n      const head = document.head;\n      const ensureMeta = (sel, attrs) => {\n        if (document.head.querySelector(sel)) return;\n        const m = document.createElement(\"meta\");\n        Object.keys(attrs).forEach((k) => m.setAttribute(k, attrs[k]));\n        head.appendChild(m);\n      };\n      ensureMeta('meta[name=\"description\"]', { name: \"description\", content: \"Mayur Shankar Pawar (Mayur Pawar) — SAP S/4HANA Finance Manager and SAP FICO consultant with 10+ years across Central Finance, Universal Journal, Digital Accounting, demergers, carve-outs, and global ERP finance transformation.\" });\n      ensureMeta('meta[name=\"keywords\"]', { name: \"keywords\", content: \"Mayur, Mayur P, Mayur Pawar, Mayur Shankar Pawar, SAP Finance Manager, SAP S/4HANA Finance Manager, SAP FICO Consultant, SAP FICO, SAP S/4HANA Finance, Central Finance, CFIN, Universal Journal, Digital Accounting, Group Reporting, Carve-Out, Demerger, Data Migration, Cutover Planning, Finance Transformation, ERP Transformation, Big 4, Deloitte, HCLTech\" });\n      ensureMeta('meta[name=\"author\"]', { name: \"author\", content: \"Mayur Shankar Pawar\" });\n      ensureMeta('meta[name=\"robots\"]', { name: \"robots\", content: \"index, follow, max-image-preview:large\" });\n      if (!head.querySelector('link[rel=\"canonical\"]')) {\n        const l = document.createElement(\"link\"); l.rel = \"canonical\"; l.href = \"https://mayurp.com/\"; head.appendChild(l);\n      }\n      if (!head.querySelector('script[type=\"application/ld+json\"]')) {\n        const s = document.createElement(\"script\"); s.type = \"application/ld+json\";\n        s.textContent = JSON.stringify({\n          \"@context\": \"https://schema.org\", \"@type\": \"Person\",\n          name: \"Mayur Shankar Pawar\",\n          alternateName: [\"Mayur Pawar\", \"Mayur P\", \"Mayur S. Pawar\", \"Mayur\"],\n          givenName: \"Mayur\", familyName: \"Pawar\",\n          jobTitle: \"SAP S/4HANA Finance Manager\",\n          url: \"https://mayurp.com/\",\n          image: \"https://mayurp.com/images/author/mayur.jpeg\",\n          email: \"mailto:mayurpawar15@gmail.com\",\n          worksFor: { \"@type\": \"Organization\", name: \"HCLTech\" },\n          sameAs: [\"https://www.linkedin.com/in/mayurpawar15/\", \"https://github.com/mayurpawar15-hub\"],\n          knowsAbout: [\"SAP FICO\", \"SAP S/4HANA Finance\", \"Central Finance\", \"Universal Journal\", \"Digital Accounting\", \"Group Reporting\", \"Carve-Out\", \"Demerger\", \"Data Migration\", \"Cutover Planning\", \"RICEFW\", \"SAP Fiori\", \"Finance Transformation\", \"ERP Transformation\", \"Program Management\", \"Stakeholder Management\"]\n        });\n        head.appendChild(s);\n      }\n    } catch (e) {}\n  }\n\n  componentDidUpdate() {\n    this.applyTheme();\n    this.updateSeg();\n  }\n\n  componentWillUnmount() {\n    if (this.mq && this.mq.removeEventListener && this._mqHandler) this.mq.removeEventListener(\"change\", this._mqHandler);\n  }\n\n  effectiveDark() {\n    const t = this.state.theme;\n    if (t === \"dark\") return true;\n    if (t === \"light\") return false;\n    return this.mq ? this.mq.matches : window.matchMedia(\"(prefers-color-scheme: dark)\").matches;\n  }\n\n  pick(t) {\n    try { localStorage.setItem(\"pf-theme\", t); } catch (e) {}\n    this.setState({ theme: t });\n  }\n\n  updateSeg() {\n    const map = { system: this.segSystemEl, light: this.segLightEl, dark: this.segDarkEl };\n    const active = this.state.theme;\n    Object.keys(map).forEach((k) => {\n      const b = map[k];\n      if (!b) return;\n      const on = k === active;\n      b.style.background = on ? \"var(--panel)\" : \"transparent\";\n      b.style.color = on ? \"var(--accent)\" : \"var(--ink3)\";\n      b.style.boxShadow = on ? \"0 1px 4px rgba(10,31,68,0.18)\" : \"none\";\n    });\n  }\n\n  hexToRgb(hex) {\n    const h = (hex || \"#0a6ed1\").replace(\"#\", \"\");\n    const v = h.length === 3 ? h.split(\"\").map((c) => c + c).join(\"\") : h;\n    const n = parseInt(v, 16);\n    return [(n >> 16) & 255, (n >> 8) & 255, n & 255];\n  }\n\n  darken(hex, amt) {\n    const [r, g, b] = this.hexToRgb(hex);\n    const f = (x) => Math.max(0, Math.round(x * (1 - amt)));\n    return \"#\" + [f(r), f(g), f(b)].map((x) => x.toString(16).padStart(2, \"0\")).join(\"\");\n  }\n\n  applyTheme() {\n    const el = this.rootEl;\n    if (!el) return;\n    const accent = this.props.accentColor || \"#0a6ed1\";\n    const [r, g, b] = this.hexToRgb(accent);\n    el.style.setProperty(\"--accent\", accent);\n    el.style.setProperty(\"--accent-deep\", this.darken(accent, 0.28));\n    el.style.setProperty(\"--accent-rgb\", r + \",\" + g + \",\" + b);\n\n    const dark = this.effectiveDark();\n    if (dark) {\n      el.style.setProperty(\"--bg\", \"#0a0f1a\");\n      el.style.setProperty(\"--bg2\", \"#0e1422\");\n      el.style.setProperty(\"--panel\", \"#131c2c\");\n      el.style.setProperty(\"--ink\", \"#eef3fa\");\n      el.style.setProperty(\"--ink2\", \"#9fb0c6\");\n      el.style.setProperty(\"--ink3\", \"#6c7d96\");\n      el.style.setProperty(\"--border\", \"#212d42\");\n      el.style.setProperty(\"--nav-bg\", \"rgba(10,15,26,0.80)\");\n    } else {\n      el.style.setProperty(\"--bg\", \"#ffffff\");\n      el.style.setProperty(\"--bg2\", \"#f5f8fc\");\n      el.style.setProperty(\"--panel\", \"#ffffff\");\n      el.style.setProperty(\"--ink\", \"#0a1322\");\n      el.style.setProperty(\"--ink2\", \"#5b6878\");\n      el.style.setProperty(\"--ink3\", \"#8a98ab\");\n      el.style.setProperty(\"--border\", \"#e6ecf3\");\n      el.style.setProperty(\"--nav-bg\", \"rgba(255,255,255,0.82)\");\n    }\n\n    if (this.glowEl) this.glowEl.style.display = this.props.glow === false ? \"none\" : \"block\";\n  }\n\n  setupReveal() {\n    const el = this.rootEl;\n    if (!el || this._revealDone) return;\n    this._revealDone = true;\n    const nodes = el.querySelectorAll(\"[data-reveal]\");\n    nodes.forEach((n) => {\n      n.style.opacity = \"0\";\n      n.style.transform = \"translateY(22px)\";\n      n.style.transition = \"opacity .7s cubic-bezier(.2,.7,.2,1), transform .7s cubic-bezier(.2,.7,.2,1)\";\n    });\n    if (!(\"IntersectionObserver\" in window)) {\n      nodes.forEach((n) => { n.style.opacity = \"1\"; n.style.transform = \"none\"; });\n      return;\n    }\n    const io = new IntersectionObserver((entries) => {\n      entries.forEach((en) => {\n        if (en.isIntersecting) {\n          en.target.style.opacity = \"1\";\n          en.target.style.transform = \"none\";\n          io.unobserve(en.target);\n        }\n      });\n    }, { threshold: 0.12, rootMargin: \"0px 0px -8% 0px\" });\n    nodes.forEach((n) => io.observe(n));\n  }\n\n  renderVals() {\n    const p = this.state.p;\n    const n = (target) => Math.round(target * p);\n    return {\n      setRoot: (el) => { this.rootEl = el; if (el) { this.applyTheme(); this.setupReveal(); } },\n      setGlow: (el) => { this.glowEl = el; },\n      setSegSystem: (el) => { this.segSystemEl = el; this.updateSeg(); },\n      setSegLight: (el) => { this.segLightEl = el; this.updateSeg(); },\n      setSegDark: (el) => { this.segDarkEl = el; this.updateSeg(); },\n      pickSystem: () => this.pick(\"system\"),\n      pickLight: () => this.pick(\"light\"),\n      pickDark: () => this.pick(\"dark\"),\n      showMarquee: this.props.showMarquee !== false,\n      stat0: n(10) + \"+\",\n      stat1: n(200) + \"+\",\n      stat2: n(80) + \"%\",\n      stat3: String(n(3)),\n    };\n  }\n}\n\u003c/script>\n\n\n\u003c/body>\u003c/html>"},"entry":"Portfolio.dc"}</script>
